<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тетрадь</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #e6f0fa; margin: 0; padding-top: 30px; }
        #game { text-align: center; }
        .board { display: grid; grid-template-columns: repeat(8, 55px); gap: 2px; margin: 15px auto; }
        .cell { width: 55px; height: 55px; border: 1px solid #a0c0f0; display: flex; align-items: center; justify-content: center; font-size: 32px; background: white; cursor: pointer; }
        .cell.disabled { opacity: 0.6; cursor: default; }
        #myPiece { font-size: 40px; }
        #turnIndicator { font-size: 1.1em; margin: 10px; }
    </style>
</head>
<body>
<div id="game">
    <div id="info">Подключение...</div>
    <div>Ваша фигура: <span id="myPiece"></span></div>
    <div id="turnIndicator"></div>
    <div class="board" id="board"></div>
</div>

<script>
    const CLIENT_ID = '1499106018074824837'; // <-- замените!

    let userId, ws, myPiece, gameState;

    async function init() {
        const { DiscordSDK } = window;
        if (!DiscordSDK) { alert('SDK не загружен'); return; }
        const auth = await DiscordSDK.commands.authorize({
            client_id: CLIENT_ID,
            response_type: 'token',
            prompt: 'none',
            scope: ['identify']
        });
        userId = auth.user.id;
        document.getElementById('info').innerText = 'Подключение к серверу...';
        connectWebSocket();
    }

    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.onopen = () => ws.send(JSON.stringify({ user_id: userId }));
        ws.onmessage = e => handleMessage(JSON.parse(e.data));
        ws.onclose = () => document.getElementById('info').innerText = 'Соединение потеряно';
    }

    function handleMessage(msg) {
        switch(msg.type) {
            case 'waiting':
                document.getElementById('info').innerText = 'Ожидание соперника...';
                break;
            case 'start':
                myPiece = msg.piece;
                document.getElementById('myPiece').innerText = myPiece;
                updateUI(msg.state);
                document.getElementById('info').innerText = 'Игра началась!';
                break;
            case 'update':
                updateUI(msg.state);
                break;
            case 'gameover':
                updateUI(msg.state);
                document.getElementById('info').innerHTML = `Победитель: <strong>${msg.winner}</strong>`;
                document.getElementById('turnIndicator').innerText = '';
                break;
            case 'opponent_left':
                document.getElementById('info').innerText = 'Соперник покинул игру';
                break;
            case 'error':
                alert(msg.message);
                break;
        }
    }

    function updateUI(state) {
        gameState = state;
        const board = document.getElementById('board');
        board.innerHTML = '';
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const idx = i * 8 + j;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = state.board[idx];
                const isMyTurn = state.turn === userId && !state.winner;
                const isEmpty = state.board[idx] === '⬜';
                if (isMyTurn && isEmpty) {
                    cell.onclick = () => {
                        const coord = String.fromCharCode(65 + j) + (i + 1);
                        ws.send(JSON.stringify({ coord }));
                    };
                } else {
                    cell.classList.add('disabled');
                }
                board.appendChild(cell);
            }
        }
        if (!state.winner) {
            document.getElementById('turnIndicator').innerText =
                state.turn === userId ? 'Ваш ход' : 'Ход соперника';
        }
    }

    init();
</script>
</body>
</html>
